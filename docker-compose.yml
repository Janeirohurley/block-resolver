services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      - VITE_APP_ID=app-c024ja55rfgh
    volumes:
      - ./src:/app/src
      - ./public:/app/public
    develop:
      watch:
        - path: ./src
          action: sync
        - path: ./public
          action: sync
